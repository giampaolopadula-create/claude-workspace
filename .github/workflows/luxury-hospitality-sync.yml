name: Luxury Hospitality Italia — Daily Sync

on:
  schedule:
    - cron: '30 1 * * *'  # 03:30 IT (01:30 UTC durante CEST)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run luxury-hospitality-sync
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/luxury-hospitality-sync.py

      - name: Commit and push registry updates
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Luxury Hospitality Sync"
          git add Lavoro/Sales-Marketing/luxury-hospitality-report-registry.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update luxury hospitality registry ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
          git push
