name: Luxury Hospitality Italia — Daily Sync
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/luxury-hospitality-sync.py
      - if: success()
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git config --local user.email "action@github.com"
          git config --local user.name "Luxury Hospitality Sync"
          git add Lavoro/Sales-Marketing/luxury-hospitality-report-registry.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update luxury hospitality registry ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
          git push
